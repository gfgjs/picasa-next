# .cargo/config.toml — Cargo 本地构建配置
# 设置 ORT_DYLIB_PATH 以便在开发模式下使用正确版本的 ORT DLL（1.21.0）
# 避免 Tauri dev 模式下的 lib.rs 路由到旧版本

[env]
# ort 的 load-dynamic 模式需要通过 ORT_DYLIB_PATH 找到 onnxruntime.dll
# ORT 1.26（从 onnxruntime-node@1.26.0 复制）
# - 支持 FP16 外部数据格式（eisneim/cn-clip_vit-b-16 模型）
# - ORT 1.21 无法加载此格式，会导致无限期卡死
# - ORT 1.26 加载 FP16 模型只需 ~200ms
ORT_DYLIB_PATH = { value = "D:\\photoapp\\picasa-next\\src-tauri\\target\\debug\\onnxruntime.dll", force = false }

