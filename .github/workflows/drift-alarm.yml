# drift-alarm —— 反向漂移告警(Part6 ③c §8)。
#
# 定位:公开仓是私有 canonical 的 SQUASH 投影,不是并行分叉——任何人类在公开仓直接 push 的改动,
#       会被下一次同步**无声覆盖**(草稿 §8)。本 workflow 在公开仓 sync-staging / main 的每次 push
#       断言 HEAD 作者 = sync-bot(copy.bara.sky authoring.overwrite 的固定身份);非 bot 提交即红叉告警,
#       提示改动须回私有仓走同步管线。
#
# 与 main ruleset 的 required checks 联动:本 check 列入 main 的必需状态检查后,人类直接落在
# sync-staging 上的 commit(本 check 红)**无法被提升到 main**——告警之外多一层硬拦截。
#
# 🔴 本文件**不被 copy.bara.sky 排除** → 随投影同步到公开仓,在公开仓生效。它也存在于私有仓,但
#    `if: github.repository` 守门使它只在公开仓执行(同 oss-gate.yml 的模式);私有仓无 sync-staging,
#    私有 main 的 push 在守门处直接 Skipped,不产生噪声红叉。
name: drift-alarm

on:
  push:
    branches: [ "sync-staging", "main" ]

jobs:
  author-check:
    name: 反向漂移告警
    # 🔴 只在公开仓执行,私有仓一律跳过。
    if: github.repository == 'gfgjs/picasa-next'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 断言 HEAD 作者为 sync-bot
        run: |
          expected="sync-bot@users.noreply.github.com"
          actual="$(git log -1 --format=%ae)"
          if [ "$actual" != "$expected" ]; then
            echo "::error::反向漂移:HEAD 作者 [$actual] 不是 sync-bot——公开仓的直接改动会被下次 SQUASH 同步无声覆盖;请把改动提交到私有 canonical 仓走同步管线"
            exit 1
          fi
          echo "✓ HEAD 由 sync-bot 提交($actual)"
