<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scrollery</title>

  <!--
    CRITICAL: This script runs synchronously during HTML parsing — before any
    CSS or layout, before WebView2 paints the first frame.
    It sets the <html> background immediately so the user never sees white.

    关键：此脚本在 HTML 解析期间同步执行，早于 CSS、布局和 WebView2 首帧渲染。
    它立即设置 <html> 背景色，防止用户看到白色闪烁。
  -->
  <script>
    (function () {
      var dark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      document.documentElement.style.background = dark ? '#141414' : '#f4f6f8';
      document.documentElement.setAttribute('data-scheme', dark ? 'dark' : 'light');
    })();
  </script>

  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    /* ── Theme tokens ────────────────────────────────────────────────── */
    :root {
      --bg:           #141414;
      --face-bg:      #1c1c2a;
      --title:        #f1f5f9;
      --subtitle:     #475569;
      --ring-from:    #6366f1;
      --ring-mid:     #8b5cf6;
      --ring-light:   #a78bfa;
      --ring-pale:    #c4b5fd;
      --dot:          #6366f1;
      --icon-stroke:  #a78bfa;
      --icon-glow:    rgba(167, 139, 250, 0.45);
    }

    /* Light theme overrides */
    [data-scheme="light"] {
      --bg:           #f4f6f8;
      --face-bg:      #eef0f5;
      --title:        #0f172a;
      --subtitle:     #64748b;
      --ring-from:    #6366f1;
      --ring-mid:     #8b5cf6;
      --ring-light:   #7c3aed;
      --ring-pale:    #6366f1;
      --dot:          #6366f1;
      --icon-stroke:  #6366f1;
      --icon-glow:    rgba(99, 102, 241, 0.30);
    }

    html, body {
      width: 100%;
      height: 100%;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      overflow: hidden;
      user-select: none;
      -webkit-app-region: drag;
      /* Smooth transition if theme is applied after initial paint */
      transition: background 0.15s ease;
    }

    /* ── Entrance animation ──────────────────────────────────────────── */
    .splash {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 22px;
      animation: splash-in 0.3s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    @keyframes splash-in {
      from { opacity: 0; transform: translateY(8px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0)   scale(1);    }
    }

    /* ── Logo ────────────────────────────────────────────────────────── */
    .logo {
      position: relative;
      width: 88px;
      height: 88px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-ring {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: conic-gradient(
        from 0deg,
        var(--ring-from)  0%,
        var(--ring-mid)   30%,
        var(--ring-light) 55%,
        var(--ring-pale)  70%,
        var(--ring-from)  100%
      );
      animation: ring-spin 2.8s linear infinite;
    }

    .logo-face {
      position: absolute;
      inset: 4px;
      border-radius: 50%;
      background: var(--face-bg);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1;
      transition: background 0.15s ease;
    }

    .logo-face svg {
      width: 38px;
      height: 38px;
      stroke: var(--icon-stroke);
      fill: none;
      stroke-width: 1.5;
      stroke-linecap: round;
      stroke-linejoin: round;
      filter: drop-shadow(0 0 6px var(--icon-glow));
      transition: stroke 0.15s ease;
    }

    @keyframes ring-spin {
      to { transform: rotate(360deg); }
    }

    /* ── Text ────────────────────────────────────────────────────────── */
    .text-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
    }

    .title {
      font-size: 21px;
      font-weight: 700;
      color: var(--title);
      letter-spacing: -0.4px;
      transition: color 0.15s ease;
    }

    .subtitle {
      font-size: 12px;
      color: var(--subtitle);
      letter-spacing: 0.05em;
      text-transform: uppercase;
      transition: color 0.15s ease;
    }

    /* ── Loading dots ────────────────────────────────────────────────── */
    .dots {
      display: flex;
      gap: 7px;
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--dot);
      animation: dot-bounce 1.3s ease-in-out infinite;
    }
    .dot:nth-child(1) { animation-delay: 0.00s; }
    .dot:nth-child(2) { animation-delay: 0.18s; }
    .dot:nth-child(3) { animation-delay: 0.36s; }

    @keyframes dot-bounce {
      0%, 75%, 100% { transform: scale(0.5); opacity: 0.25; }
      38%            { transform: scale(1.0); opacity: 1.00; }
    }
  </style>
</head>
<body>
  <div class="splash">

    <div class="logo">
      <div class="logo-ring"></div>
      <div class="logo-face">
        <!-- Lucide "Aperture" icon -->
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <circle cx="12" cy="12" r="10"/>
          <line x1="14.31" y1="8"  x2="20.05" y2="17.94"/>
          <line x1="9.69"  y1="8"  x2="21.17" y2="8"/>
          <line x1="7.38"  y1="12" x2="13.12" y2="2.06"/>
          <line x1="9.69"  y1="16" x2="3.95"  y2="6.06"/>
          <line x1="14.31" y1="16" x2="2.83"  y2="16"/>
          <line x1="16.62" y1="12" x2="10.88" y2="21.94"/>
        </svg>
      </div>
    </div>

    <div class="text-group">
      <div class="title">Scrollery</div>
      <div class="subtitle">正在启动</div>
    </div>

    <div class="dots">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>

  </div>
</body>
</html>
